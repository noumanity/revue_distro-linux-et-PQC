name: title
description: "Page de titre de la présentation"
fields:
  content:
    required: []
    optional:
      - name: title
        description: "Titre principal affiché en grand"
        type: string
      - name: authors
        description: "Liste d'auteurs. Chaque entrée est soit une chaîne, soit un objet {name, role}"
        type: "list<string|object>"
      - name: date
        description: "Date et heure de la présentation"
        type: string
      - name: location
        description: "Lieu de la présentation"
        type: string
      - name: event
        description: "Nom de l'événement ou de l'organisme hôte"
        type: string
      - name: logos
        description: "Liste de chemins vers les logos (présentateur, organisateur...)"
        type: "list<path>"
      - name: background
        description: "Chemin vers l'image de fond (SVG, PNG, JPEG, WEBP)"
        type: path
  params:
    optional: []
notes: >
  Le champ authors accepte deux formats : liste de chaînes simples, ou liste d'objets
  {name: "Nom", role: "Titre du poste"}. Avec le format objet, le nom est affiché en
  gras et le rôle en italique plus petit. Les logos sont positionnés en bas à droite,
  hauteur max 1.1cm. Les infos (event, date, location) apparaissent en bas à gauche.
example: |
  ---
  diapo:
    model: title
  content:
    title: "Titre de la présentation"
    authors:
      - name: "Prénom Nom"
        role: "Rôle"
    date: "jour mois heure"
    location: "Ville - lieu"
    event: "Nom de l'événement"
    logos:
      - "@src/assets/logo-presentateur.svg"
      - "@src/assets/logo-organisateur.webp"
    background: "@src/assets/image-fond.png"
  ---
